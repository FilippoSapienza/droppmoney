<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1c2d4f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Droppmoney" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>Droppmoney</title>
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #1c2d4f;
        display: flex; align-items: center; justify-content: center;
        transition: opacity 0.5s ease;
      }
      #splash img { width: 80px; height: 80px; border-radius: 50%; }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/logo.png" alt="Droppmoney" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.style.opacity = 0; setTimeout(() => s.remove(), 500); }
        }, 800);
      });
    </script>
  </body>
</html>
