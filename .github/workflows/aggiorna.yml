name: Aggiorna Dati Portafoglio

on:
  schedule:
    - cron: '0 7-19/2 * * 1-5'
  workflow_dispatch:

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas yfinance numpy

      - name: Esegui calcolo giornaliero
        run: python calcolo_giornaliero.py 

      - name: Commit e push dati aggiornati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Aggiornamento dati $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push